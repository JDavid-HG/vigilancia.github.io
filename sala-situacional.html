<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>UVS - Reporte Epidemiológico</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap');

    :root {
        --primary: #00f2ff;
        --bg-deep: #0a0e14;
        --card-bg: rgba(255, 255, 255, 0.03);
        --border: rgba(0, 242, 255, 0.2);
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        background-color: var(--bg-deep);
        color: #fff;
        font-family: 'Inter', sans-serif;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    /* HEADER RESPONSIVO */
    header {
        padding: 15px 20px;
        background: rgba(0, 0, 0, 0.8);
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        backdrop-filter: blur(10px);
        position: sticky;
        top: 0;
        z-index: 100;
    }

    .logo-text {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 0.9rem;
        color: var(--primary);
    }

    /* CONTENEDOR PRINCIPAL ADAPTATIVO */
    .main-layout {
        display: flex;
        flex-direction: column;
        gap: 20px;
        padding: 15px;
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
    }

    /* SECCIÓN DEL VIDEO */
    .video-container {
        width: 100%;
        background: #000;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--border);
        position: relative;
        /* Proporción 16:9 para móviles */
        aspect-ratio: 16 / 9;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: contain; /* Asegura que no se corte el contenido en móviles */
    }

    /* TARJETAS DE DATOS */
    .info-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 15px;
    }

    .card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        padding: 15px;
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .card-label {
        font-size: 0.7rem;
        color: #8898aa;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .card-value {
        font-family: 'JetBrains Mono', monospace;
        font-size: 1rem;
        color: #fff;
    }

    .live-tag {
        color: #4ade80;
        display: flex;
        align-items: center;
        gap: 6px;
        font-weight: bold;
    }

    .dot {
        width: 8px;
        height: 8px;
        background: #4ade80;
        border-radius: 50%;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse { 50% { opacity: 0.3; } }

    /* BOTÓN ADAPTADO A PULGAR MÓVIL */
    .btn-action {
        display: block;
        width: 100%;
        padding: 18px;
        background: transparent;
        border: 1px solid var(--primary);
        color: var(--primary);
        text-align: center;
        text-decoration: none;
        border-radius: 12px;
        font-weight: 600;
        margin-top: 10px;
        transition: 0.3s;
    }

    .btn-action:active { /* Feedback táctil para móviles */
        background: var(--primary);
        color: #000;
    }

    /* AJUSTES PARA PC (PANTALLAS GRANDES) */
    @media (min-width: 992px) {
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            padding: 30px;
            align-items: start;
        }
        .btn-action { width: auto; }
    }
</style>
</head>
<body>

    <header>
        <div class="logo-text">SALA SITUACIONAL</div>
        <div id="clock" style="font-family: 'JetBrains Mono'; font-size: 0.8rem;">00:00:00</div>
    </header>

    <div class="main-layout">
        
        <div class="video-container">
            <video id="v" autoplay muted loop playsinline controls>
                <source src="semana8.mp4" type="video/mp4">
                Tu navegador no soporta video.
            </video>
        </div>

        <div class="info-side">
            <div class="info-grid">
                <div class="card">
                    <div class="card-label">Estado de Transmisión</div>
                    <div class="card-value live-tag">
                        <div class="dot"></div> SEMANA EPI 7
                    </div>
                </div>

                <div class="card">
                    <div class="card-label">Identificador de Unidad</div>
                    <div class="card-value">UVS-RSMDC | HN</div>
                </div>

                <div class="card">
                    <div class="card-label">Fecha del Sistema</div>
                    <div id="date" class="card-value">--/--/----</div>
                </div>
            </div>

            <a href="inicio.html" class="btn-action">VOLVER AL MENÚ</a>
        </div>

    </div>

    <script>
        function updateDisplay() {
            const now = new Date();
            
            // Reloj
            document.getElementById('clock').textContent = now.toLocaleTimeString('es-HN', { hour12: false });

            // Fecha
            const d = String(now.getDate()).padStart(2, '0');
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const y = now.getFullYear();
            document.getElementById('date').textContent = `${d}/${m}/${y}`;
        }

        // Forzar reproducción en algunos móviles que entran en modo ahorro
        window.addEventListener('load', () => {
            const video = document.getElementById('v');
            video.play().catch(() => {
                console.log("El usuario debe interactuar para reproducir");
            });
        });

        setInterval(updateDisplay, 1000);
        updateDisplay();
    </script>
</body>
</html>
