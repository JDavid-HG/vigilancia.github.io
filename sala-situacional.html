<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sala Situacional — Presentación de Video</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    /* VARIABLES DE COLOR - Estilo Moderno y Profesional */
    :root {
        --bg-color: #0a0e17; /* Fondo oscuro muy suave */
        --primary-color: #007bff; /* Azul vibrante */
        --primary-glow: rgba(0, 123, 255, 0.5);
        --header-bg: rgba(16, 23, 37, 0.95); /* Encabezado semi-transparente */
        --card-bg: rgba(255, 255, 255, 0.03); /* Tarjetas oscuras y sutiles */
        --text-main: #e0e6ed;
        --text-muted: #8898aa;
        --border-color: rgba(255, 255, 255, 0.08);
    }

    /* ESTILOS BASE Y FONDO ANIMADO SUTIL */
    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-color);
        background-image: 
            radial-gradient(at 10% 10%, rgba(0, 123, 255, 0.15) 0px, transparent 50%),
            radial-gradient(at 90% 90%, rgba(0, 229, 255, 0.1) 0px, transparent 50%);
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    /* ENCABEZADO "FLOTANTE" MODERNO */
    header {
        background-color: var(--header-bg);
        backdrop-filter: blur(10px); /* Efecto esmerilado */
        padding: 20px 30px;
        text-align: center;
        border-bottom: 1px solid var(--border-color);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    header h1 {
        margin: 0;
        font-size: 26px;
        font-weight: 800;
        letter-spacing: 1px;
        text-transform: uppercase;
        background: linear-gradient(135deg, #ffffff 0%, #a0cfff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* INFORMACIÓN DE LA SEMANA */
    #semanaInfo {
        text-align: center;
        padding: 15px 0;
        font-size: 15px;
        color: var(--text-muted);
        background-color: rgba(0, 0, 0, 0.2);
        border-bottom: 1px solid var(--border-color);
    }

    #semanaInfo span {
        color: var(--primary-color);
        font-weight: 600;
        margin-left: 5px;
    }

    /* CONTENEDOR PRINCIPAL */
    .main-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
        box-sizing: border-box;
    }

    /* TÍTULO DE LA SECCIÓN */
    .section-title {
        font-size: 18px;
        color: var(--text-main);
        margin-bottom: 30px;
        text-transform: uppercase;
        letter-spacing: 2px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .section-title::before,
    .section-title::after {
        content: '';
        height: 1px;
        width: 50px;
        background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
    }

    /* CONTENEDOR DEL VIDEO CON EFECTO RESPLANDOR (GLOW) */
    .video-showcase {
        width: 100%;
        background-color: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 10px; 
        box-sizing: border-box;
        position: relative;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 100px -20px var(--primary-glow);
    }

    .video-showcase:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6), 0 0 120px -10px var(--primary-glow);
    }

    .video-showcase video {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 12px;
        outline: none;
        aspect-ratio: 16 / 9;
        background-color: #000;
    }

    /* BOTÓN VOLVER */
    .btn-container {
        margin-top: 50px;
        text-align: center;
    }

    .btn-volver {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 30px;
        background: transparent;
        color: var(--primary-color);
        text-decoration: none;
        border-radius: 50px;
        font-weight: 600;
        font-size: 15px;
        text-transform: uppercase;
        letter-spacing: 1px;
        border: 2px solid var(--primary-color);
        transition: all 0.3s ease;
    }

    .btn-volver:hover {
        color: #fff;
        background-color: var(--primary-color);
        box-shadow: 0 0 20px var(--primary-glow);
    }

    @media (max-width: 768px) {
        header h1 { font-size: 20px; }
        .main-container { padding: 20px 10px; }
        .section-title { font-size: 16px; }
    }
</style>
</head>
<body>

<header>
    <h1>Sala Situacional</h1>
</header>

<div id="semanaInfo">
    UVS-RSMDC | <span id="fechaActual"></span> | <span id="semanaEpi"></span>
</div>

<div class="main-container">
    
    <div class="section-title">
        <span>📽️ Presentación Multimedia</span>
    </div>

    <div class="video-showcase">
        <video controls autoplay muted loop playsinline>
            <source src="semana7.mp4.mp4" type="video/mp4">
            Tu navegador no soporta la reproducción de video.
        </video>
    </div>

    <div class="btn-container">
        <a href="inicio.html" class="btn-volver">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Volver al Panel Principal
        </a>
    </div>
</div>

<script>
    function updateHeaderInfo() {
        const now = new Date();
        
        // 1. Fecha formateada (ej: 24 May 2024)
        const options = { year: 'numeric', month: 'short', day: 'numeric' };
        document.getElementById('fechaActual').textContent = now.toLocaleDateString('es-HN', options);

        // 2. Forzar Semana Epidemiológica 7
        const semanaManual = 7;
        document.getElementById('semanaEpi').textContent = "Semana Epi: " + semanaManual + " — " + now.getFullYear();
    }

    updateHeaderInfo();
</script>

</body>
</html>
