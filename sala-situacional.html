<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sala Situacional — Dashboard UVS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    :root {
        --bg-color: #05080a;
        --accent-color: #00d4ff;
        --accent-glow: rgba(0, 212, 255, 0.3);
        --text-main: #f0f2f5;
        --text-dim: #94a3b8;
        --glass: rgba(15, 23, 42, 0.8);
    }

    body {
        margin: 0;
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        background-color: var(--bg-color);
        background-image: 
            radial-gradient(circle at top right, rgba(0, 212, 255, 0.1), transparent 400px),
            radial-gradient(circle at bottom left, rgba(0, 123, 255, 0.05), transparent 400px);
        color: var(--text-main);
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* BARRA DE PROGRESO DEL VIDEO */
    #progress-bar {
        position: fixed;
        top: 0;
        left: 0;
        height: 3px;
        background: var(--accent-color);
        width: 0%;
        z-index: 2000;
        box-shadow: 0 0 10px var(--accent-color);
        transition: width 0.2s;
    }

    header {
        background: var(--glass);
        backdrop-filter: blur(12px);
        padding: 15px 5%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    header h1 {
        margin: 0;
        font-size: 1.2rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        background: linear-gradient(to right, #fff, var(--accent-color));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* STATUS BAR */
    .status-bar {
        background: rgba(0, 0, 0, 0.4);
        padding: 8px 5%;
        display: flex;
        justify-content: center;
        gap: 20px;
        font-size: 0.85rem;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        color: var(--text-dim);
    }

    .live-dot {
        height: 8px;
        width: 8px;
        background-color: #ff4b4b;
        border-radius: 50%;
        display: inline-block;
        margin-right: 5px;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.3; }
        100% { opacity: 1; }
    }

    .main-container {
        max-width: 1100px;
        margin: 40px auto;
        padding: 0 20px;
    }

    .video-frame {
        position: relative;
        background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0));
        border-radius: 24px;
        padding: 12px;
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
    }

    video {
        width: 100%;
        border-radius: 16px;
        display: block;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .info-card {
        margin-top: 30px;
        background: var(--glass);
        border-radius: 15px;
        padding: 20px;
        border: 1px solid rgba(255,255,255,0.05);
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
    }

    .stat-item {
        text-align: center;
        border-right: 1px solid rgba(255,255,255,0.1);
    }

    .stat-item:last-child { border: none; }

    .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }
    .stat-value { font-size: 1.1rem; font-weight: bold; color: var(--accent-color); margin-top: 5px; }

    .btn-volver {
        display: inline-flex;
        align-items: center;
        margin-top: 30px;
        padding: 12px 25px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        color: white;
        text-decoration: none;
        border-radius: 12px;
        transition: all 0.3s;
        font-size: 0.9rem;
    }

    .btn-volver:hover {
        background: var(--accent-color);
        color: #000;
        transform: translateY(-2px);
    }

</style>
</head>
<body>

<div id="progress-bar"></div>

<header>
    <h1>Sala Situacional</h1>
    <div style="font-size: 0.8rem; color: var(--accent-color); font-weight: bold;">UVS-RSMDC</div>
</header>

<div class="status-bar">
    <span><span class="live-dot"></span> SISTEMA EN VIVO</span>
    <span>| <span id="fechaActual"></span></span>
    <span>| <span id="relojActual" style="font-family: monospace;"></span></span>
</div>

<div class="main-container">
    <div class="video-frame">
        <video id="mainVideo" controls autoplay muted loop>
            <source src="semana7.mp4.mp4" type="video/mp4">
        </video>
    </div>

    <div class="info-card">
        <div class="stat-item">
            <div class="stat-label">Reporte Actual</div>
            <div class="stat-value">Semana Epi 7</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Jurisdicción</div>
            <div class="stat-value">RSMDC</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Estado de Red</div>
            <div class="stat-value" style="color: #4ade80;">Operativo</div>
        </div>
    </div>

    <center>
        <a href="inicio.html" class="btn-volver">
            ← Regresar al Panel de Control
        </a>
    </center>
</div>

<script>
    const video = document.getElementById('mainVideo');
    const progressBar = document.getElementById('progress-bar');

    function updateUI() {
        const now = new Date();
        
        // Reloj y Fecha
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('fechaActual').textContent = now.toLocaleDateString('es-HN', options);
        document.getElementById('relojActual').textContent = now.toLocaleTimeString('es-HN', { hour12: false });

        // Barra de progreso del video
        if (video.duration) {
            const pc = (video.currentTime / video.duration) * 100;
            progressBar.style.width = pc + "%";
        }
    }

    setInterval(updateUI, 1000);
    updateUI();
</script>

</body>
</html>
